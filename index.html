<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pista Caliente - Venta de Autitos Hot Wheels</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-logo">
            <h1>PISTA CALIENTE</h1>
            <p>Coleccionables a toda velocidad - Actividad de Algoritmos y Estructuras de Datos</p>
        </div>
    </header>

    <main class="contenedor-principal">
        <section class="catalogo">
            <h2>Modelos Disponibles</h2>
            <div id="lista-productos" class="grid-productos">
                </div>
        </section>

        <aside class="panel-carrito">
            <h2>Tu Carrito</h2>
            <div id="items-carrito" class="items-carrito">
                <p>El carrito está vacío.</p>
            </div>
            <div class="total">
                <h3>Total: $<span id="total-carrito">0</span></h3>
                <button class="btn-comprar" onclick="alert('¡Compra simulada con éxito!')">Finalizar Compra</button>
            </div>
        </aside>
    </main>

    <footer>
        <p>Proyecto Estático para Algoritmos y Estructuras de Datos | UTN</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
